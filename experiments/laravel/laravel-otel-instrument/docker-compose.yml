version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_test_project
    # volumes:
    #   - ./:/var/www
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      OTEL_SERVICE_NAME: laravel
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:54318
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://host.docker.internal:54318/v1/traces
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://host.docker.internal:54318/v1/logs
      OTEL_PHP_AUTOLOAD_ENABLED: "true"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_PHP_TRACES_PROCESSOR: simple
      OTEL_LOG_LEVEL: info
      OTEL_PROPAGATORS: baggage,tracecontext
    networks:
      - app-network

  db:
    # image: mysql:8.0
    # container_name: laravel_db
    # environment:
    #   MYSQL_DATABASE: test_crud
    #   MYSQL_ROOT_PASSWORD: ""
    #   MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    # volumes:
    #   - dbdata:/var/lib/mysql
    # networks:
    #   - app-network


    image: postgres:15
    container_name: php-postgres
    environment:
      POSTGRES_DB: test_crud
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "root"
    ports:
      - "5433:5432"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  # signoz-net:
  #   external: true

volumes:
  dbdata:
