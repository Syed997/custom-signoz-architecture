# version: "3.8"

services:
  kafka:
    image: bitnamilegacy/kafka:3.8
    container_name: kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INSIDE://:9092,OUTSIDE://:9094,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INSIDE://kafka:9092,OUTSIDE://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INSIDE
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER   # 👈 required!
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - demo
  #     # - signoz-net

  demo-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: demo-collector
    volumes:
      - ./demo-config.yaml:/etc/otelcol-contrib/config.yaml
      - ./oteloutput:/oteloutput
    ports:
      - "54317:54317"
      - "54318:54318"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - demo

  kafka-bridge:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: kafka-bridge
    volumes:
      - ./kafka-bridge-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - demo
      # - signoz-net

networks:
  demo:
    driver: bridge
  # signoz-net:
  #   name: signoz-net
  #   external: true

