receivers:
  kafka/traces:
    brokers: ["kafka:9092"]
    topic: demo-flask-traces
    encoding: otlp_proto
    group_id: signoz-bridge-traces
    initial_offset: latest
  kafka/metrics:
    brokers: ["kafka:9092"]
    topic: demo-flask-metrics
    encoding: otlp_proto
    group_id: signoz-bridge-metrics
    initial_offset: latest
  kafka/redis_metrics:
    brokers: ["kafka:9092"]
    topic: demo-redis-metrics
    encoding: otlp_proto
    group_id: signoz-bridge-redis-metrics
    initial_offset: latest
  kafka/laravel_traces:
    brokers: ["kafka:9092"]
    topic: demo-laravel-traces
    encoding: otlp_proto
    group_id: signoz-bridge-laravel-traces
    initial_offset: latest
  kafka/laravel_logs:
    brokers: ["kafka:9092"]
    topic: demo-laravel-logs
    encoding: otlp_proto
    group_id: signoz-bridge-laravel-logs
    initial_offset: latest
  kafka/laravel_metrics:
    brokers: ["kafka:9092"]
    topic: demo-laravel-metrics
    encoding: otlp_proto
    group_id: signoz-bridge-laravel-metrics
    initial_offset: latest
  kafka/postgres_metrics:
    brokers: ["kafka:9092"]
    topic: demo-postgres-metrics
    encoding: otlp_proto
    group_id: signoz-bridge-postgres-metrics
    initial_offset: latest

processors:
  batch:

exporters:
  otlp:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [kafka/traces]
      processors: [batch]
      exporters: [otlp]
    metrics:
      receivers: [kafka/metrics]
      processors: [batch]
      exporters: [otlp]
    metrics/redis:
      receivers: [kafka/redis_metrics]
      processors: [batch]
      exporters: [otlp]
    traces/laravel:
      receivers: [kafka/laravel_traces]
      processors: [batch]
      exporters: [otlp]
    logs/laravel:
      receivers: [kafka/laravel_logs]
      processors: [batch]
      exporters: [otlp]
    metrics/laravel:
      receivers: [kafka/laravel_metrics]
      processors: [batch]
      exporters: [otlp]
    metrics/postgres:
      receivers: [kafka/postgres_metrics]
      processors: [batch]
      exporters: [otlp]
